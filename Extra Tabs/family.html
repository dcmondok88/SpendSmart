<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Household Income</title>

    <style>
        .less80{
            color: green;
        }
        .less100{
            color: orange;
        }
        .at100{
            color: red;
        }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #e9ffe9, #d6ffd6);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .page-container {
            background: white;
            padding: 40px;
            width: 450px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 28px;
            color: #2d8a2d;
        }

        #valueBox {
            margin: 0 auto;
            padding: 15px;
            width: 350px;
            border-radius: 8px;
            border: 1px solid #2e7d32 !important;
            background: #e8ffe8;
            font-weight: bold;
            color: black;
            font-size: 18px;
        }

        .backBtn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2d8a2d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .backBtn:hover {
            background-color: #256f25;
        }

        input {
            display: block;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
        }

        /* centering the form and making inputs easier to read */
        #userInput {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center; /* centers all inputs */
            gap: 12px; /* adds spacing between each input group */
        }

        #userInput label {
            font-weight: bold;
            margin-bottom: 3px;
        }

        #userInput input[type="text"] {
            width: 220px; /* consistent width */
            padding: 6px;
            text-align: center; /* makes it easier to see what you're typing */
            border-radius: 5px;
            border: 1px solid #6bbf59;
        }

        /* making the annual income box match the others but with a darker green border */
        #userIncome {
            width: 220px;
            padding: 6px;
            text-align: center;
            border-radius: 5px;
            border: 2px solid #2e7d32; /* darker green border */
            background-color: #f6fff6; /* subtle light green background */
        }
    </style>
</head>

<body>

    <div class="page-container">

        <div id="valueBox">Awaiting user input...</div>

        <h1>Family Household Income</h1>

        <!-- user enters their own annual income here -->
        <label for="userIncome" style="font-weight:bold; margin-top:20px;">Enter your annual household income:</label>
        <input type="text" id="userIncome" name="userIncome" style="margin: 10px auto; display:block;">

    <form id="userInput">

        <label for="automobile">Enter average automobile expenses:</label>
        <input type="text" id="automobile" name="automobile">

        <label for="electric">Enter average electricity usage:</label>
        <input type="text" id="electric" name="electric">

        <label for="food">Enter average food expenses:</label>
        <input type="text" id="food" name="food">

        <label for="fuel">Enter average fuel usage:</label>
        <input type="text" id="fuel" name="fuel">

        <label for="gas">Enter average gas usage:</label>
        <input type="text" id="gas" name="gas">

        <label for="health">Enter average healthcare expenses:</label>
        <input type="text" id="health" name="health">

        <label for="internet">Enter average internet usage:</label>
        <input type="text" id="internet" name="internet">

        <label for="phone">Enter average phone usage:</label>
        <input type="text" id="phone" name="phone">

        <label for="rent">Enter rent/mortgage:</label>
        <input type="text" id="rent" name="rent">

        <label for="water">Enter average water usage:</label>
        <input type="text" id="water" name="water">

        <label for="misc">Enter average miscellaneous expenses:</label>
        <input type="text" id="misc" name="misc">

        <input type="submit" value="Submit" onclick="generateTable(); return false;">
    </form>

        <!-- moving the Back to Home button below the submit button -->
        <a class="backBtn" href="../FrontEnd Display/index.html">Back to Home</a>

    <table id="data"></table>

    </div>

    <script>
        async function loadIncome() {
            const URL = "https://raw.githubusercontent.com/dcmondok88/SpendSmart/refs/heads/main/AnalysisEngine/ga_census_data.json";
            const response = await fetch(URL);
            const censusData = await response.json();

            // letting the user know what this page is about when it loads
            window.alert(
                "This page helps you calculate your total annual spending as a Family Household. " +
                "Enter your expenses below and click submit when finished. " +
                "A table will be generated below based on your inputs. " +
                "If you spend more than your income, you will receive an alert. " +
                "If you are saving less than 20% of your income, you will also receive a warning."
            );

            // NEW: do not show median income anymore
            document.getElementById("valueBox").textContent =
                "Awaiting user input...";

            // clearing table when page loads/reloads
            document.getElementById("data").innerHTML = "";

            // clearing form when page loads/reloads
            document.getElementById("userInput").reset();
        }

        /* NEW: updating the valueBox live as the user types their income */
        document.addEventListener("input", function () {

            let income = document.getElementById("userIncome").value.trim();
            document.getElementById("valueBox").textContent = "User's Annual Income: " + income;
            // preventing letters
            if (value !== "" && isNaN(value)) {
                alert("Please enter numbers only.");
                incomeBox.value = "";
                return;
            }

            // preventing negative numbers
            if (value !== "" && Number(value) < 0) {
                alert("Values cannot be negative.");
                incomeBox.value = "";
                return;
            }

            // preventing numbers from starting with 0 unless the value is exactly "0"
            if (value.length > 1 && value.startsWith("0")) {
                alert("Numbers cannot start with 0.");
                incomeBox.value = "";
                return;
            }

            // if the user clears the box, show placeholder again
            if (income === "") {
                document.getElementById("valueBox").textContent =
                    "Awaiting user input...";
            }

            // otherwise show the user's income
            else {
                document.getElementById("valueBox").textContent =
                    `Your Annual Income: ${income}`;
            }
        });

        function generateTable() {
            let inputs = document.querySelectorAll("input");
          
            for (let i = 0; i < inputs.length; i++) {

                // skipping submit button so it doesn't get checked
                if (inputs[i].type === "submit") {
                    continue;
                }

                // checking for empty input
                if (inputs[i].value.trim() === "") {
                    alert("Please fill out all fields.");
                    return;
                }

                // checking for letters
                if (isNaN(inputs[i].value)) {
                    alert("Please enter numbers only.");
                    return;
                }

                // checking for negative numbers
                if (Number(inputs[i].value) < 0) {
                    alert("Values cannot be negative.");
                    return;
                }

                // preventing numbers from starting with 0 unless the value is exactly "0"
                if (inputs[i].value.length > 1 && inputs[i].value.startsWith("0")) {
                    alert("Numbers cannot start with 0.");
                    return;
                }
            }

            // making sure user entered their annual income
            let userIncome = Number(document.getElementById("userIncome").value);

            if (document.getElementById("userIncome").value.trim() === "") {
                alert("Please enter your annual household income.");
                return;
            }

            // getting numbers from input fields and calculating total spending
            let electric = Number(document.getElementById("electric").value);
            let internet = Number(document.getElementById("internet").value);
            let food = Number(document.getElementById("food").value);
            let fuel = Number(document.getElementById("fuel").value);
            let gas = Number(document.getElementById("gas").value);
            let health = Number(document.getElementById("health").value);
            let phone = Number(document.getElementById("phone").value);
            let rent = Number(document.getElementById("rent").value);
            let water = Number(document.getElementById("water").value);
            let automobile = Number(document.getElementById("automobile").value);
            let misc = Number(document.getElementById("misc").value);

            let total = electric + internet + food + fuel + gas + health + phone + rent + water + automobile + misc;

            // checking if spending is more than user income
            if (total > userIncome) {
                alert("You cannot spend more than your income.");
                return;
            }

            // checking if user is saving less than 20%
            if (total > userIncome * 0.80) {
                alert("Warning: You are saving less than 20% of your income.");
            }

            let table = document.getElementById("data");

            // clearing old table rows before adding new ones
            table.innerHTML = "";

            // original table rows (user income row removed)
            let row = table.insertRow();
            let cell1 = row.insertCell(0);
            let cell2 = row.insertCell(1);
            cell1.innerHTML = "Automobile Expenses";
            cell2.innerHTML = document.getElementById("automobile").value;
            
            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Electricity Usage";
            cell2.innerHTML = document.getElementById("electric").value;

            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Food Expenses";
            cell2.innerHTML = document.getElementById("food").value;

            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Fuel Usage";
            cell2.innerHTML = document.getElementById("fuel").value;

            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Gas Usage";
            cell2.innerHTML = document.getElementById("gas").value;

            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Healthcare Expenses";
            cell2.innerHTML = document.getElementById("health").value;

            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Internet Usage";
            cell2.innerHTML = document.getElementById("internet").value;

            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Phone Usage";
            cell2.innerHTML = document.getElementById("phone").value;

            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Rent/Mortgage";
            cell2.innerHTML = document.getElementById("rent").value;

            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Water Usage";
            cell2.innerHTML = document.getElementById("water").value;

            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Miscellaneous Expenses";
            cell2.innerHTML = document.getElementById("misc").value;
        
            row = table.insertRow();
            cell1 = row.insertCell(0);
            cell2 = row.insertCell(1);
            cell1.innerHTML = "Total Expenses";
            cell2.innerHTML = total;

            row = table.insertRow();
            cell1 = row.insertCell(0);
            cellFinal = row.insertCell(1);
            cell1.innerHTML = "Percentage";
            let pct = (total / userIncome)*100
            cellFinal.innerHTML = pct.toFixed(2) + '%';

            if (pct < 80){cellFinal.classList.add('less80')}
            else if (pct < 100){cellFinal.classList.add('less100')}
            else if (pct >= 100){cellFinal.classList.add('at100')}            
        }

        loadIncome();
    </script>

</body>
</html>
