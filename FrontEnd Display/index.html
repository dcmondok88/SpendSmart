<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
</head>
<body>
    <h1>Welcome to the Home Page</h1>
    <p>This is the front-end display of our application.</p> 
       <script>
        async function populate() {
            const URL = "https://raw.githubusercontent.com/dcmondok88/SpendSmart/refs/heads/main/AnalysisEngine/ga_census_data.json"
            const request = new Request(URL);
            const response = await fetch(request);
            const result = await response.json();
            document.writeln(result.g);
            
        }

        populate();
    </script>
</html>
